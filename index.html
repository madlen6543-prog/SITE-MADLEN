<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מדלן פריד - לבטא את עצמך באותנטיות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #0a0a0a; color: #f3f4f6; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.07); }
        .btn-main { background: linear-gradient(135deg, #d946ef 0%, #7e22ce 100%); transition: all 0.3s; }
        .option-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); cursor: pointer; }
        .step-container { display: none; }
        .step-active { display: flex; flex-direction: column; }
        .admin-lead-card { background: #ffffff; border-radius: 20px; padding: 20px; color: #1e293b; border-right: 8px solid #c026d3; margin-bottom: 16px; }
    </style>
</head>
<body class="p-4" dir="rtl">

    <div id="app-wrapper" class="max-w-md mx-auto min-h-[90vh] flex flex-col justify-between py-6">
        <main class="flex-grow flex flex-col justify-center">
            
            <!-- Step 0 -->
            <div id="step-0" class="step-container step-active text-center">
                <h1 class="text-3xl font-black mb-8 text-white">למה מול אנשים קל לך להיעלם?</h1>
                <button onclick="startQuiz()" class="btn-main w-full py-6 rounded-3xl font-black text-lg">איך עושים את זה?</button>
            </div>

            <!-- Steps -->
            <div id="step-1" class="step-container text-center"><h2 class="text-2xl font-bold mb-8 text-fuchsia-300">מה הכי מאתגר?</h2>
                <div class="grid gap-4"><div onclick="selectOption('האתגר המרכזי', 'להראות מי אני באמת', 2)" class="option-card p-5 rounded-2xl">להראות מי אני באמת</div><div onclick="selectOption('האתגר המרכזי', 'להיבלע בקבוצה', 2)" class="option-card p-5 rounded-2xl">להיבלע בקבוצה</div></div>
            </div>

            <!-- ... [שאר שלבי השאלון נשמרים כפי שהיו] ... -->
            
            <!-- Admin Dashboard -->
            <div id="admin-dashboard" class="step-container hidden bg-white text-slate-900 rounded-3xl p-6 min-h-[70vh]">
                <h2 class="text-2xl font-black mb-4">ניהול פניות</h2>
                <div id="leads-container" class="space-y-4"></div>
                <button onclick="location.reload()" class="mt-6 text-sm underline">יציאה</button>
            </div>
        </main>
    </div>

    <script>
        let db, auth;
        const appId = 'madlenfrid-566c9';
        
        async function initFirebase() {
            if (!firebase.apps.length) {
                firebase.initializeApp({
                    apiKey: "AIzaSyA4rY0AWdiMsAgu9JSxlFuWqjGbhkkZ5mA",
                    authDomain: "madlenfrid-566c9.firebaseapp.com",
                    projectId: "madlenfrid-566c9"
                });
            }
            auth = firebase.auth();
            db = firebase.firestore();
            if (!auth.currentUser) await auth.signInAnonymously();
            return true;
        }

        async function loadLeads() {
            await initFirebase();
            try {
                db.collection('artifacts').doc(appId).collection('public').doc('data').collection('leads')
                .onSnapshot(snap => {
                    const container = document.getElementById('leads-container');
                    container.innerHTML = '';
                    snap.forEach(doc => {
                        const l = doc.data();
                        const div = document.createElement('div');
                        div.className = 'admin-lead-card';
                        div.innerHTML = `
                            <p><b>שם:</b> ${l.personal?.name || '--'}</p>
                            <p><b>טלפון:</b> ${l.personal?.phone || '--'}</p>
                            <p><b>מה תפס אותי:</b> ${l.personal?.note || '--'}</p>
                            <button onclick="deleteLead('${doc.id}')" class="mt-4 bg-red-500 text-white px-4 py-2 rounded">מחק</button>
                        `;
                        container.appendChild(div);
                    });
                });
            } catch(e) { alert("שגיאה בטעינה: " + e.message); }
        }

        async function deleteLead(id) {
            if(confirm("בטוח למחוק?")) {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('leads').doc(id).delete();
            }
        }

        function checkPass() {
            if(document.getElementById('admin-pass').value === "4150") {
                showStep('admin-dashboard');
                loadLeads();
            }
        }
        
        // ... פונקציות הניווט (showStep, selectOption) נשארות כשהיו
    </script>
</body>
</html>
