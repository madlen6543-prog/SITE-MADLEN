<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מדלן פריד - לבטא את עצמך באותנטיות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; }
        .step-container { display: none; }
        .step-active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
        .btn-main { background: linear-gradient(135deg, #d946ef 0%, #7e22ce 100%); }
    </style>
</head>
<body class="p-4">
    <div id="app" class="max-w-md mx-auto">
        <!-- מסך פתיחה -->
        <div id="step-0" class="step-container step-active">
            <h1 class="text-3xl font-black mb-8">מדלן פריד - לבטא את עצמך</h1>
            <button onclick="showStep('step-1')" class="btn-main w-full py-4 rounded-xl font-bold">להתחלת האבחון</button>
        </div>
        
        <!-- שלבים -->
        <div id="step-1" class="step-container">
            <h2 class="text-xl mb-4">מה הכי מאתגר אותך?</h2>
            <button onclick="nextStep()" class="option-card p-4 border rounded-xl w-full mb-2">להראות מי אני</button>
            <button onclick="nextStep()" class="option-card p-4 border rounded-xl w-full">להיבלע בקבוצה</button>
        </div>

        <!-- ניהול מנהלת -->
        <div id="step-admin" class="step-container hidden">
            <h2 class="text-xl mb-4">ניהול פניות</h2>
            <div id="leads-list" class="w-full"></div>
            <button onclick="location.reload()" class="mt-4 text-xs underline">חזרה</button>
        </div>
    </div>

    <script>
        function showStep(id) {
            document.querySelectorAll('.step-container').forEach(s => s.classList.remove('step-active'));
            document.getElementById(id).classList.add('step-active');
        }
        function nextStep() { alert('שלב הבא'); }
        
        // טריגר סודי למנהלת
        let clicks = 0;
        document.body.addEventListener('click', (e) => {
            if(e.target.tagName === 'FOOTER' || e.target.id === 'app') clicks++;
            if(clicks >= 5) { showStep('step-admin'); clicks = 0; }
        });
    </script>
</body>
</html>
