<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מדלן פריד - לבטא את עצמך באותנטיות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #0a0a0a; background-image: radial-gradient(circle at 10% 20%, rgba(217, 70, 239, 0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(90, 34, 139, 0.1) 0%, transparent 40%), url('https://www.transparenttextures.com/patterns/stardust.png'); min-height: 100vh; color: #f3f4f6; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.07); }
        .btn-main { background: linear-gradient(135deg, #d946ef 0%, #7e22ce 100%); transition: all 0.4s; box-shadow: 0 10px 25px -5px rgba(217, 70, 239, 0.4); }
        .btn-main:hover:not(:disabled) { transform: translateY(-3px) scale(1.02); box-shadow: 0 20px 35px -10px rgba(217, 70, 239, 0.6); }
        .option-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.25s ease; cursor: pointer; text-align: right; }
        .option-card:hover { border-color: #d946ef; background: rgba(217, 70, 239, 0.08); }
        .step-container { display: none; animation: fadeIn 0.6s ease forwards; }
        .step-active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        .progress-fill { height: 100%; background: #d946ef; transition: width 0.4s ease; box-shadow: 0 0 10px #d946ef; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
        .admin-lead-card { background: #ffffff; border-radius: 20px; padding: 20px; color: #1e293b; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .feedback-pop { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(217, 70, 239, 0.95); padding: 8px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; z-index: 100; opacity: 0; transition: all 0.3s ease; color: white; white-space: nowrap; }
    </style>
</head>
<body class="flex items-center justify-center p-4" dir="rtl">
    <div id="feedback-toast" class="feedback-pop">הבנתי אותך..</div>
    <div id="notification" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] pointer-events-none opacity-0 transition-opacity duration-300 text-center w-full px-4"><div id="notification-content" class="bg-fuchsia-600 text-white px-6 py-3 rounded-full shadow-xl text-sm font-bold mx-auto inline-block"></div></div>
    
    <div id="confirm-modal" class="modal-overlay">
        <div class="glass p-8 rounded-3xl max-w-xs w-full text-center space-y-6">
            <h3 class="text-xl font-bold text-white">למחוק את הפנייה?</h3>
            <div class="flex gap-4"><button onclick="executeDelete()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">כן, מחק</button><button onclick="closeConfirmModal()" class="flex-1 bg-white/10 text-white py-3 rounded-xl font-bold">ביטול</button></div>
        </div>
    </div>

    <div id="app-wrapper" class="max-w-md w-full min-h-[90vh] flex flex-col justify-between py-6 relative z-10 text-white text-center">
        <div id="top-nav" class="mb-6 opacity-0 transition-opacity pointer-events-none">
            <div class="flex items-center justify-between mb-4"><button onclick="goBack()" class="p-2">חזרה</button><div class="text-[10px] uppercase tracking-widest opacity-60">אבחון מותאם אישית</div></div>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill" style="width: 0%;"></div></div>
        </div>

        <main class="flex-grow flex flex-col justify-center">
            <div id="step-0" class="step-container step-active flex-col">
                <div class="mb-12 px-2"><div class="inline-block p-4 bg-fuchsia-500/10 rounded-full text-5xl mb-8 animate-pulse">🗣️</div><h1 class="text-3xl font-black mb-8 leading-tight">למה מול אנשים הרבה יותר קל לך להיעלם ולהיסגר?</h1><p class="text-gray-300 text-lg">יש לך כל כך הרבה מה להגיד, אבל בחוץ המילים נתקעות.</p></div>
                <button onclick="startQuiz()" class="btn-main w-full py-6 rounded-3xl font-black text-lg">איך עושים את זה?</button>
            </div>

            <div id="quiz-flow">
                <div id="step-1" class="step-container flex-col"><h2 class="text-2xl font-bold mb-8 text-fuchsia-300">מה הכי מאתגר אותך?</h2><div class="grid gap-4"><div onclick="selectOption('האתגר המרכזי', 'להראות מי אני', 2)" class="option-card p-5 rounded-2xl">להראות מי אני</div><div onclick="selectOption('האתגר המרכזי', 'להיבלע בקבוצה', 2)" class="option-card p-5 rounded-2xl">להיבלע בקבוצה</div></div></div>
                <!-- שאר השלבים... (הקוד המלא כאן) -->
            </div>
            <div id="step-success" class="step-container flex-col text-center">
                <div class="text-7xl mb-8">💜</div>
                <h2 class="text-3xl font-black mb-6">תודה על האמון.</h2>
                <button onclick="window.open('https://wa.me/972524073915')" class="btn-main w-full py-6 rounded-3xl font-bold text-xl">בוא/י נתאם! ❤️</button>
            </div>
            
            <div id="admin-dashboard" class="step-container flex-col bg-white text-slate-900 rounded-3xl p-6 min-h-[70vh] overflow-y-auto text-right">
                <div class="flex justify-between items-center mb-8 border-b pb-4"><h2 class="text-2xl font-black text-fuchsia-700">ניהול פניות</h2><button onclick="location.reload()" class="text-xs bg-slate-100 px-3 py-1 rounded-full">התנתקות</button></div>
                <div id="leads-container" class="space-y-6"></div>
            </div>
        </main>
        <footer class="mt-12 opacity-40"><span id="admin-trigger" class="cursor-pointer">מדלן פריד • לבטא את עצמך באותנטיות</span></footer>
    </div>

    <script>
        let db, auth, leadToDelete;
        const ADMIN_CODE = "4150";
        
        async function initFirebase() {
            if (!firebase.apps.length) {
                firebase.initializeApp({
                    apiKey: "AIzaSyA4rY0AWdiMsAgu9JSxlFuWqjGbhkkZ5mA",
                    authDomain: "madlenfrid-566c9.firebaseapp.com",
                    projectId: "madlenfrid-566c9"
                });
            }
            auth = firebase.auth();
            db = firebase.firestore();
            if (!auth.currentUser) await auth.signInAnonymously();
        }
        initFirebase();

        document.getElementById('admin-trigger').onclick = () => {
            if(prompt("קוד מנהלת:") === ADMIN_CODE) { showStep('admin-dashboard'); loadLeads(); }
        };

        function loadLeads() {
            db.collection('artifacts').doc('madlenfrid-566c9').collection('public').doc('data').collection('leads')
            .onSnapshot(snap => {
                const container = document.getElementById('leads-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const l = doc.data();
                    const div = document.createElement('div');
                    div.className = 'admin-lead-card';
                    div.innerHTML = `
                        <div class="flex justify-between font-black text-fuchsia-700">${l.personal?.name || 'ללא שם'} <button onclick="confirmDelete('${doc.id}')" class="text-red-500">מחק</button></div>
                        <div class="text-sm">טלפון: ${l.personal?.phone || '--'}</div>
                        <div class="text-xs text-slate-500 mt-2">${JSON.stringify(l.answers)}</div>
                    `;
                    container.appendChild(div);
                });
            });
        }
        
        function confirmDelete(id) { leadToDelete = id; document.getElementById('confirm-modal').style.display = 'flex'; }
        async function executeDelete() {
            await db.collection('artifacts').doc('madlenfrid-566c9').collection('public').doc('data').collection('leads').doc(leadToDelete).delete();
            closeConfirmModal();
        }
        function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; }
    </script>
</body>
</html>
